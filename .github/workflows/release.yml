name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip TestPyPI/PyPI publish and GitHub release"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi-publish:
    name: Publish to TestPyPI
    needs: build
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/project/loctran/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke_test_testpypi:
    name: Smoke test from TestPyPI
    needs: testpypi-publish
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package from TestPyPI (with retry)
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          echo "Waiting for loctran==${VERSION} on TestPyPI..."

          for i in {1..12}; do
            if python -m pip install --upgrade --no-cache-dir \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "loctran==${VERSION}"; then
              echo "Install succeeded on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i} failed; retrying in 15s..."
            sleep 15
          done

          echo "Package was not available on TestPyPI after retries."
          exit 1

      - name: Import smoke test
        run: python -c "import loctran; print(loctran.__version__)"

  pypi-publish:
    name: Publish to PyPI
    needs: smoke_test_testpypi
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/loctran/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: [build, pypi-publish]
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
