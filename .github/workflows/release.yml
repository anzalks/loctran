name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" ruff mypy build twine types-Pillow

      - name: Lint & format check
        run: |
          ruff check loctran/
          ruff format --check loctran/

      - name: Type check
        run: mypy loctran/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest --cov=loctran --cov-report=xml --cov-fail-under=75 -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build and validate distribution
        run: |
          python -m build
          twine check dist/*

  # --- Release (only on version tags, after all CI passes) ---

  build_and_smoke_test:
    name: Build & Smoke Test
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Abort if tag is not on main
        run: |
          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "::error::Release tags must be on the main branch"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Create fresh environment and smoke test
        run: |
          python -m venv test_env
          test_env/bin/python -m pip install dist/*.whl
          test_env/bin/python -c "
          import loctran
          import loctran.extraction
          import loctran.translate
          import loctran.server
          print('version:', loctran.__version__)
          print('all subpackages imported OK')
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  pypi_publish:
    name: Publish to PyPI
    needs: build_and_smoke_test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/loctran
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: pypi_publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
