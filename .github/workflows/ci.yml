name: CI

on:
  workflow_call:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" ruff mypy build twine types-Pillow

      - name: Lint & format check
        run: |
          ruff check loctran/
          ruff format --check loctran/

      - name: Type check
        run: mypy loctran/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest --cov=loctran --cov-report=xml --cov-fail-under=75 -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build and validate distribution
        run: |
          python -m build
          twine check dist/*

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Type check
        run: mypy loctran/ --ignore-missing-imports --no-strict-optional
