name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,server]" ruff mypy build twine types-Pillow

      - name: Lint & format check
        run: |
          ruff check loctran/
          ruff format --check loctran/

      - name: Type check
        run: mypy loctran/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest --cov=loctran --cov-fail-under=70 -q

      - name: Build and validate distribution
        run: |
          python -m build
          twine check dist/*
